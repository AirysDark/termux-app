name: Analyze Extracted Termux Port

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - "termux-port/**"

jobs:
  analyze-termux:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # 2️⃣ Install Python (for analyzer scripts)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Prepare artifact folder
      - name: Create analysis output folder
        run: mkdir -p analysis_output

      # 4️⃣ Run Python analyzer script
      - name: Analyze extracted Termux port
        run: |
          python3 <<'EOF'
          import os
          import re
          import json

          PORT_DIR = os.path.join(os.getcwd(), "extracted-termux")
          OUTPUT_JSON = os.path.join("analysis_output", "analysis.json")
          OUTPUT_TXT = os.path.join("analysis_output", "summary.txt")

          FUNCTION_EXTS = [".java", ".js", ".ts"]
          FUNCTION_PATTERNS = {
              ".java": r"\b(?:public|private|protected)?\s*(?:static\s+)?(?:[\w<>[\]]+\s+)+(\w+)\s*\(",
              ".js": r"function\s+(\w+)\s*\(",
              ".ts": r"function\s+(\w+)\s*\("
          }

          # Scan all files and record extensions
          all_files = []
          extensions = set()
          for root, dirs, files in os.walk(PORT_DIR):
              for f in files:
                  path = os.path.relpath(os.path.join(root, f), PORT_DIR)
                  ext = os.path.splitext(f)[1].lower()
                  extensions.add(ext)
                  all_files.append(path)

          # Scan functions/methods in Java/JS/TS files
          functions = {}
          for f in all_files:
              ext = os.path.splitext(f)[1].lower()
              if ext in FUNCTION_EXTS:
                  pattern = FUNCTION_PATTERNS[ext]
                  try:
                      with open(os.path.join(PORT_DIR, f), encoding="utf-8") as file:
                          content = file.read()
                      matches = re.findall(pattern, content)
                      if matches:
                          functions[f] = matches
                  except Exception as e:
                      functions[f] = [f"ERROR reading file: {e}"]

          # Detect XML layouts and extra key files
          xml_files = [f for f in all_files if f.endswith(".xml")]
          extra_keys = [f for f in all_files if "extra" in f.lower()]

          # Write JSON report
          report = {
              "total_files": len(all_files),
              "extensions": sorted(list(extensions)),
              "all_files": all_files,
              "functions": functions,
              "xml_files": xml_files,
              "extra_keys_files": extra_keys
          }

          os.makedirs(os.path.dirname(OUTPUT_JSON), exist_ok=True)
          with open(OUTPUT_JSON, "w", encoding="utf-8") as f:
              json.dump(report, f, indent=2)

          # Write human-readable text summary
          with open(OUTPUT_TXT, "w", encoding="utf-8") as f:
              f.write(f"Total files scanned: {len(all_files)}\n")
              f.write(f"Extensions found: {sorted(list(extensions))}\n\n")
              f.write("Java/JS/TS function scan:\n")
              for file, funcs in functions.items():
                  f.write(f"  {file} -> {len(funcs)} functions: {funcs}\n")
              f.write("\nXML layout files:\n")
              for xf in xml_files:
                  f.write(f"  {xf}\n")
              f.write("\nExtra key files:\n")
              for ek in extra_keys:
                  f.write(f"  {ek}\n")
          EOF

      # 5️⃣ Upload analysis artifacts
      - name: Upload analysis reports
        uses: actions/upload-artifact@v6
        with:
          name: termux-analysis
          path: analysis_output
