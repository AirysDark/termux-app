name: Extract Termux Modules

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Terminal Emulator
      - name: Extract Terminal Emulator
        run: |
          mkdir -p extracted/terminal-emulator
          cp -r terminal-emulator/src/main/java/com/termux/terminal extracted/terminal-emulator/
          cp -r terminal-emulator/src/main/jni extracted/terminal-emulator/jni
          cd extracted
          zip -r terminal-emulator.zip terminal-emulator
          cd ..

      # Terminal View
      - name: Extract Terminal View
        run: |
          mkdir -p extracted/terminal-view
          cp -r terminal-view/src/main/java/com/termux/view extracted/terminal-view/view
          cp -r terminal-view/src/main/res extracted/terminal-view/res
          cd extracted
          zip -r terminal-view.zip terminal-view
          cd ..

      # App
      - name: Extract App
        run: |
          mkdir -p extracted/app
          cp -r app/src/main/java/com/termux/app extracted/app/com/termux/app
          cp -r app/src/main/res extracted/app/res
          cd extracted
          zip -r app.zip app
          cd ..

      # Shared
      - name: Extract Shared Libraries
        run: |
          mkdir -p extracted/shared
          cp -r termux-shared/src/main/java/com/termux/shared extracted/shared
          cd extracted
          zip -r shared.zip shared
          cd ..

      # Upload artifacts
      - name: Upload extracted modules
        uses: actions/upload-artifact@v6
        with:
          name: extracted-termux
          path: |
            extracted/terminal-emulator.zip
            extracted/terminal-view.zip
            extracted/app.zip
            extracted/shared.zip
