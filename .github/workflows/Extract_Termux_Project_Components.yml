name: Extract Termux Linux Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - "termux-port/**"

jobs:
  extract-termux-linux:
    runs-on: ubuntu-latest
    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # 2️⃣ Prepare extraction folders
      - name: Create extraction folders
        run: |
          mkdir -p linux-port/terminal-emulator
          mkdir -p linux-port/terminal-view
          mkdir -p linux-port/app
          mkdir -p linux-port/shared
          mkdir -p linux-port/res
          mkdir -p linux-port/logs

      # 3️⃣ Copy modules
      - name: Copy Terminal Emulator
        run: |
          cp -r terminal-emulator/src/main/java/com/termux/terminal linux-port/terminal-emulator/terminal
          cp -r terminal-emulator/src/main/jni linux-port/terminal-emulator/jni

      - name: Copy Terminal View
        run: |
          cp -r terminal-view/src/main/java/com/termux/view linux-port/terminal-view/view
          cp -r terminal-view/src/main/res linux-port/terminal-view/res

      - name: Copy Termux App
        run: |
          cp -r app/src/main/java/com/termux/app linux-port/app/com/termux/app
          cp -r app/src/main/res/* linux-port/res/

      - name: Copy Shared Libraries
        run: |
          cp -r termux-shared/src/main/java/com/termux/shared linux-port/shared

      # 4️⃣ Verify critical folders & XMLs
      - name: Verify folders & XMLs
        run: |
          REQUIRED_FOLDERS=("linux-port/terminal-emulator/terminal" "linux-port/terminal-view/view" "linux-port/app/com/termux/app" "linux-port/shared")
          for f in "${REQUIRED_FOLDERS[@]}"; do
            [ ! -d "$f" ] && echo "❌ Missing: $f"
          done
          XML_COUNT=$(find linux-port/res -name "*.xml" | wc -l)
          echo "✅ XML files found: $XML_COUNT"

      # 5️⃣ Scan Java functions
      - name: Scan Java functions
        shell: python
        run: |
          import os, re, json
          PORT_DIR = "linux-port"
          REPORT_FILE = os.path.join(PORT_DIR, "logs", "function_scan.json")
          EXTENSIONS = [".java"]
          PATTERNS = {".java": r"\b(?:public|private|protected)?\s*(?:static\s+)?(?:[\w<>[\]]+\s+)+(\w+)\s*\("}
          functions = {}
          for root, dirs, files in os.walk(PORT_DIR):
              for f in files:
                  ext = os.path.splitext(f)[1].lower()
                  if ext in EXTENSIONS:
                      try:
                          with open(os.path.join(root, f), encoding="utf-8") as fh:
                              content = fh.read()
                          matches = re.findall(PATTERNS[ext], content)
                          if matches:
                              functions[os.path.relpath(os.path.join(root, f), PORT_DIR)] = matches
                      except Exception as e:
                          print(f"⚠ Failed to read {f}: {e}")
          os.makedirs(os.path.dirname(REPORT_FILE), exist_ok=True)
          with open(REPORT_FILE, "w") as out:
              json.dump(functions, out, indent=2)
          print(f"✅ Function scan completed: {REPORT_FILE}")

      # 6️⃣ Generate build manifest
      - name: Build manifest
        run: |
          cd linux-port
          find . -type f | sort > build_manifest.txt
          cd ..

      # 7️⃣ Package modules as zips
      - name: Package modules
        run: |
          cd linux-port
          zip -r terminal-emulator.zip terminal-emulator
          zip -r terminal-view.zip terminal-view
          zip -r app.zip app
          zip -r shared.zip shared
          cd ..

      # 8️⃣ Upload artifacts
      - name: Upload zips and logs
        uses: actions/upload-artifact@v6
        with:
          name: linux-port
          path: |
            linux-port/terminal-emulator.zip
            linux-port/terminal-view.zip
            linux-port/app.zip
            linux-port/shared.zip
            linux-port/build_manifest.txt
            linux-port/logs/function_scan.json
